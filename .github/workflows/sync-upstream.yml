name: Sync Upstream
on:
  schedule:
    - cron: '0 */6 * * *' # Every 6 hours
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Sync fork
        run: gh repo sync ${{ github.repository }} --source nexu-io/open-design
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
